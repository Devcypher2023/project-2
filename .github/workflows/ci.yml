name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  id-token: write
  contents: read

jobs:
  validate-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Show repo structure
        run: |
          pwd
          ls -la
          echo "----- app folder -----"
          ls -la app || true
          echo "----- terraform/docker-server -----"
          ls -la terraform/docker-server || true
          echo "----- terraform/ecs-fargate -----"
          ls -la terraform/ecs-fargate || true

      - name: Validate required app files
        run: |
          test -f app/app.py
          test -f app/requirements.txt
          test -f app/Dockerfile
          test -f app/templates/index.html

      - name: Validate required terraform files
        run: |
          test -f terraform/docker-server/main.tf
          test -f terraform/ecs-fargate/ecs.tf
          test -f terraform/ecs-fargate/vpc.tf
          test -f terraform/ecs-fargate/alb.tf
          test -f terraform/ecs-fargate/repo.tf

      - name: Build Docker image
        run: |
          docker build -t devops-app:test ./app

      - name: Verify Docker image
        run: |
          docker images | grep devops-app    

      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ACTION_ROLE }}
          aws-region: us-east-1

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify ECR login output
        run: |
          echo "Logged into ECR registry: ${{ steps.ecr-login.outputs.registry }}"    


      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker image for ECR
        run: |
          docker build -t ${{ steps.ecr-login.outputs.registry }}/devops-fargate-repo:${IMAGE_TAG} ./app

      - name: Verify Docker image exists
        run: |
          docker images | grep devops-fargate-repo