name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: devops-fargate-repo

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Show repo structure
        run: |
          pwd
          ls -la
          echo "----- app folder -----"
          ls -la app || true
          echo "----- terraform/docker-server -----"
          ls -la terraform/docker-server || true
          echo "----- terraform/ecs-fargate -----"
          ls -la terraform/ecs-fargate || true

      - name: Validate required app files
        run: |
          test -f app/app.py
          test -f app/requirements.txt
          test -f app/Dockerfile
          test -f app/templates/index.html

      - name: Validate required terraform files
        run: |
          test -f terraform/docker-server/main.tf
          test -f terraform/docker-server/iam.tf
          test -f terraform/ecs-fargate/ecs.tf
          test -f terraform/ecs-fargate/vpc.tf
          test -f terraform/ecs-fargate/alb.tf
          test -f terraform/ecs-fargate/repo.tf
          test -f terraform/ecs-fargate/oidc.tf

      - name: Set image tag
        id: set-tag
        run: echo "image_tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build local Docker image
        run: |
          docker build -t devops-app:test ./app

      - name: Verify local image
        run: |
          docker images | grep devops-app


  push-to-ecr:
    runs-on: ubuntu-latest
    needs: validate-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ACTION_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image for ECR
        run: |
          docker build -t ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.validate-and-build.outputs.image_tag }} ./app

      - name: Tag image as latest
        run: |
          docker tag \
          ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.validate-and-build.outputs.image_tag }} \
          ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Push image (commit tag)
        run: |
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.validate-and-build.outputs.image_tag }}

      - name: Push image (latest)
        run: |
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest